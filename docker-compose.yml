version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: nav_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - nav_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nav_redis
    ports:
      - "6379:6379"
    networks:
      - nav_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: nav_rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    networks:
      - nav_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nav_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/shipfinex
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - BINANCE_WS_URL=wss://stream.binance.com:9443/ws/!ticker@arr
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nav_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nav_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - nav_network

volumes:
  mongodb_data:

networks:
  nav_network:
    driver: bridge
